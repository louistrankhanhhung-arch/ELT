<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ELT Game Engine</title>
  <style>
    :root {
      --bg: #fff7fb;
      --panel: #ffffff;
      --ink: #173044;
      --muted: #6b7a86;
      --accent: #d23b2a;
      --blue: #0f74a8;
      --good: #2fa866;
      --bad: #d94646;
      --border: rgba(23,48,68,.14);
      --shadow: 0 10px 28px rgba(23,48,68,.14);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    .app {
      width: min(1180px, 100vw);
      min-height: 100vh;
      margin: 0 auto;
      padding: clamp(12px, 3vw, 30px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    h1 {
      margin: 0;
      color: var(--accent);
      font-size: clamp(36px, 6vw, 76px);
      line-height: 1;
      font-weight: 500;
      text-align: center;
    }

    .subtitle {
      color: var(--muted);
      font-size: clamp(16px, 2vw, 22px);
      font-weight: 800;
      text-align: center;
      min-height: 28px;
    }

    .panel {
      width: min(980px, 100%);
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(14px, 3vw, 28px);
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: clamp(16px, 2vw, 21px);
      font-weight: 800;
      cursor: pointer;
      background: white;
      color: var(--ink);
      box-shadow: 0 3px 10px rgba(23,48,68,.12);
      transition: transform .12s ease, opacity .12s ease, background .12s ease;
      user-select: none;
    }

    button:active { transform: scale(.97); }
    button.primary { background: var(--blue); color: white; }
    button.accent { background: var(--accent); color: white; }
    button.good { background: var(--good); color: white; }
    button:disabled { opacity: .45; cursor: not-allowed; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(12px, 3vw, 24px);
      width: 100%;
    }

    .card {
      background: white;
      border: 4px solid transparent;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
      position: relative;
      min-height: 96px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      container-type: inline-size;
    }

    .card:hover { transform: translateY(-2px); }
    .card.correct { border-color: var(--good); box-shadow: 0 0 0 6px rgba(47,168,102,.16), var(--shadow); }
    .card.wrong { border-color: var(--bad); animation: shake .28s linear; }
    .card.active { border-color: var(--blue); box-shadow: 0 0 0 6px rgba(15,116,168,.16), var(--shadow); }
    .card.disabled { opacity: .55; pointer-events: none; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .card img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
      background: #eef3f5;
    }

    .label {
      text-align: center;
      color: var(--accent);
      font-size: clamp(24px, 4vw, 44px);
      padding: 10px;
      line-height: 1.08;
      font-weight: 800;
    }

    .largeText {
      text-align: center;
      color: var(--accent);
      font-size: clamp(34px, 6vw, 72px);
      font-weight: 900;
      line-height: 1.08;
      padding: 12px;
    }

    /* =========================================================
       Memory Match Text Fit Patch
       Desktop / Tablet / Smartphone Landscape
       ========================================================= */

    .memoryGrid {
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    }

    .memoryWord {
      width: 100%;
      height: 100%;
      min-height: 96px;
      padding: clamp(6px, 1.2vw, 14px);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--accent);
      font-weight: 900;
      line-height: .92;
      font-size: clamp(24px, 8cqw, 64px);
      overflow-wrap: anywhere;
      word-break: break-word;
      hyphens: auto;
    }

    .memoryQuestion {
      font-size: clamp(30px, 10cqw, 64px);
    }

    .status {
      min-height: 30px;
      color: var(--muted);
      font-size: clamp(16px, 2vw, 22px);
      font-weight: 800;
      text-align: center;
    }

    .scorebar {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      color: var(--muted);
      font-weight: 900;
      font-size: clamp(15px, 2vw, 20px);
    }

    .builderTarget, .builderAnswer {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      min-height: 64px;
      padding: 12px;
      border: 2px dashed var(--border);
      border-radius: 18px;
      background: rgba(15,116,168,.04);
    }

    .wordTile {
      border-radius: 999px;
      padding: 12px 18px;
      font-size: clamp(22px, 3vw, 36px);
      font-weight: 900;
      background: white;
      color: var(--accent);
      box-shadow: 0 3px 10px rgba(23,48,68,.12);
      cursor: pointer;
      user-select: none;
    }

    .lineItem {
      border-radius: 18px;
      padding: 12px 16px;
      font-size: clamp(22px, 3vw, 38px);
      font-weight: 850;
      color: var(--accent);
      background: white;
      box-shadow: 0 3px 10px rgba(23,48,68,.12);
      cursor: pointer;
      line-height: 1.12;
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .hiddenWord {
      color: transparent;
      position: relative;
    }
    .hiddenWord::after {
      content: "••••";
      color: var(--muted);
      letter-spacing: 6px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .error {
      margin: auto;
      max-width: 760px;
      padding: 20px;
      border-radius: 22px;
      background: #fff;
      color: var(--bad);
      font-weight: 700;
      line-height: 1.45;
    }



    /* =========================================================
       Foundation Games: Spin Wheel / Lucky Box / Missing / Find
       ========================================================= */

    .singleCardWrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 0;
    }
    
    .singleCardWrap .card {
      width: min(420px, 80vw);
      cursor: default;
    }

    .wheelStage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .wheelPointer {
      width: 0;
      height: 0;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-top: 34px solid var(--accent);
      filter: drop-shadow(0 4px 8px rgba(23,48,68,.18));
    }

    .wheelResult {
      width: min(420px, 80vw);
      border-radius: 999px;
      padding: 10px 16px;
      background: rgba(15,116,168,.08);
      border: 4px dashed rgba(15,116,168,.22);
      text-align: center;
      color: var(--blue);
      font-weight: 900;
      font-size: clamp(20px, 3vw, 34px);
    }

    .wheelStage .card img {
      aspect-ratio: 16 / 9;
      width: 100%;
      height: clamp(170px, 32vh, 260px);
      object-fit: contain;
    }

    .wheelStage .singleCardWrap .card {
      min-height: 220px;
    }

    .spinning .card {
      transform: scale(1.02);
      border-color: var(--blue);
    }

    .boxGrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 220px));
      justify-content: center;
      gap: clamp(12px, 3vw, 24px);
    }

    .luckyBox {
      min-height: 160px;
      border-radius: 24px;
      background: linear-gradient(180deg, #fff, #fff2f5);
      box-shadow: var(--shadow);
      border: 4px solid rgba(210,59,42,.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(54px, 10vw, 96px);
      cursor: pointer;
      user-select: none;
      transition: transform .14s ease, border-color .14s ease;
    }

    .luckyBox:hover { transform: translateY(-3px); }
    .luckyBox.opened {
      font-size: initial;
      display: block;
      overflow: hidden;
      background: white;
      border-color: var(--good);
    }

    .luckyBox.opened img {
      width: 100%;
      height: 180px;
      object-fit: contain;
      display: block;
      background: #eef3f5;
    }
    
    .luckyBox.opened .label {
      font-size: clamp(18px, 2vw, 28px);
      padding: 8px;
    }

    .missingCard.hiddenPicture img { filter: blur(10px); opacity: .12; }
    .missingCard.hiddenPicture .label { color: transparent; }
    .missingCard.hiddenPicture::after {
      content: '?';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(64px, 12vw, 120px);
      color: var(--accent);
      font-weight: 900;
      background: rgba(255,255,255,.72);
    }

    @media (orientation: landscape) and (max-height: 520px) {
      .singleCardWrap { min-height: 0; height: 100%; }
      .singleCardWrap .card { width: min(360px, 100%); }
      .wheelStage { gap: 6px; height: 100%; justify-content: center; }
      .wheelStage .singleCardWrap .card {
        min-height: 0;
        height: min(42vh, 145px);
      }
      .wheelStage .card img {
        height: min(34vh, 115px);
        aspect-ratio: 16 / 9;
        object-fit: contain;
      }
      .wheelPointer { border-left-width: 14px; border-right-width: 14px; border-top-width: 20px; }
      .wheelResult { font-size: clamp(14px, 3.2vh, 22px); padding: 6px; }
      .boxGrid { grid-template-columns: repeat(auto-fit, minmax(86px, 1fr)); gap: 7px; height: 100%; }
      .luckyBox { min-height: 0; font-size: clamp(34px, 9vh, 54px); border-radius: 14px; }
    }

    @media (max-width: 700px) {
      .grid { gap: 10px; }
      button { padding: 10px 13px; }
      .panel { padding: 12px; }
    }

    /* =========================================================
       Desktop / Tablet Auto-fit Layout
       Game Engine
       ========================================================= */
    
    /* Flexible grid for 4–6 cards */
    .grid {
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: clamp(10px, 2vw, 22px);
    }
    
    /* Tablet / desktop: use wider panel and better card scaling */
    @media (min-width: 768px) {
      .panel {
        width: min(1080px, 100%);
      }
    
      .grid {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }
    
      .card img {
        aspect-ratio: 4 / 3;
      }
    
      .label {
        font-size: clamp(22px, 3vw, 38px);
        padding: 8px 8px 12px;
      }
    }

    .memoryGrid {
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      }

      .memoryWord {
        min-height: 130px;
        font-size: clamp(24px, 5.2cqw, 38px);
        line-height: .98;
      }
    
    /* Desktop landscape: allow 5–6 items to sit in one row */
    @media (min-width: 1050px) {
      .panel {
        width: min(1140px, 100%);
      }
    
      .grid {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      }
    
      .card img {
        aspect-ratio: 4 / 3;
      }
    }

    .memoryGrid {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }

      .memoryWord {
        min-height: 160px;
        font-size: clamp(22px, 4.6cqw, 34px);
        line-height: .98;
      }
    
    /* Wider desktop: avoid oversized cards */
    @media (min-width: 1220px) {
      .grid {
        grid-template-columns: repeat(auto-fit, minmax(165px, 1fr));
      }
    }

    /* =========================================================
     Nearpod Smartphone Landscape Patch
     For 4–6 vocab / sentence cards
     ========================================================= */
  
    /* More flexible grid for normal screens */
    .grid {
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: clamp(10px, 2vw, 20px);
    }
    
    /* Compact mode for Nearpod app on smartphone landscape */
    @media (orientation: landscape) and (max-height: 520px) {
      body {
        overflow: hidden;
      }
    
      .app {
        width: 100vw;
        height: 100dvh;
        min-height: 0;
        padding: 6px 10px;
        gap: 5px;
        display: grid;
        grid-template-rows: auto auto auto 1fr auto auto;
        align-items: stretch;
      }
    
      h1 {
        font-size: clamp(20px, 4vh, 32px);
        line-height: 1;
      }
    
      .subtitle {
        font-size: clamp(12px, 2.6vh, 16px);
        min-height: 0;
      }
    
      .scorebar {
        font-size: clamp(11px, 2.4vh, 15px);
        gap: 8px;
      }
    
      .panel {
        width: 100%;
        height: 100%;
        min-height: 0;
        padding: 8px;
        border-radius: 16px;
        overflow: auto;
      }
    
      .grid {
        height: 100%;
        grid-template-columns: repeat(auto-fit, minmax(92px, 1fr));
        gap: 7px;
        align-items: stretch;
      }
    
      .card {
        min-height: 0;
        border-radius: 14px;
      }
    
      .card img {
        height: min(28vh, 95px);
        aspect-ratio: 4 / 3;
        object-fit: cover;
      }
    
      .label {
        font-size: clamp(13px, 3vh, 19px);
        padding: 4px;
        line-height: 1.05;
      }
    
      .largeText {
        font-size: clamp(22px, 5vh, 38px);
        padding: 6px;
      }

      .memoryGrid {
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 7px;
      }

      .memoryWord {
        min-height: 0;
        padding: 4px;
        font-size: clamp(18px, 8cqw, 38px);
        line-height: .9;
      }

      .memoryQuestion {
        font-size: clamp(22px, 10cqw, 40px);
      }
    
      .controls {
        gap: 6px;
      }
    
      button {
        padding: 7px 11px;
        font-size: clamp(12px, 2.8vh, 16px);
      }
    
      .status {
        min-height: 18px;
        font-size: clamp(11px, 2.5vh, 15px);
      }
    
      .builderTarget,
      .builderAnswer {
        min-height: 42px;
        padding: 7px;
        gap: 6px;
      }
    
      .wordTile {
        padding: 7px 12px;
        font-size: clamp(16px, 3.5vh, 24px);
      }
    
      .lineItem {
        padding: 7px 10px;
        font-size: clamp(15px, 3.4vh, 22px);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1 id="title">Game</h1>
    <div class="subtitle" id="subtitle"></div>
    <div class="scorebar" id="scorebar"></div>
    <section class="panel" id="game"></section>
    <div class="controls" id="controls"></div>
    <div class="status" id="status"></div>
  </main>

  <audio id="audio" preload="auto"></audio>

  <script>
    const DEFAULT_DATA = {
      type: "listen-choose",
      title: "Listen & Choose",
      subtitle: "",
      settings: { shuffle: true, rounds: 5, slowRate: 0.75 },
      items: [
        { word: "boy", img: "img/boy.jpg", audio: "audio/boy.mp3" },
        { word: "girl", img: "img/girl.jpg", audio: "audio/girl.mp3" },
        { word: "teacher", img: "img/teacher.jpg", audio: "audio/teacher.mp3" },
        { word: "student", img: "img/student.jpg", audio: "audio/student.mp3" }
      ]
    };

    const els = {
      title: document.getElementById('title'),
      subtitle: document.getElementById('subtitle'),
      scorebar: document.getElementById('scorebar'),
      game: document.getElementById('game'),
      controls: document.getElementById('controls'),
      status: document.getElementById('status'),
      audio: document.getElementById('audio')
    };

    let data = DEFAULT_DATA;
    let state = { score: 0, round: 0, answer: null, selected: [], bank: [], order: [] };

    function getParam(name) { return new URLSearchParams(location.search).get(name); }
    function isTeacherView() {
      return (getParam('role') || 'student').toLowerCase() === 'teacher';
    }

    async function loadData() {
      const url = getParam('data');
      if (!url) return DEFAULT_DATA;
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error('Cannot load JSON data: ' + url);
      return await res.json();
    }

    function normalizeData(d) {
      const safe = { ...DEFAULT_DATA, ...d };
      safe.settings = { ...DEFAULT_DATA.settings, ...(d.settings || {}) };
      return safe;
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>'"]/g, c => ({
        '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;'
      }[c]));
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function setStatus(msg) { els.status.textContent = msg || ''; }
    function setScore() { els.scorebar.innerHTML = `<span>Score: ${state.score}</span><span>Round: ${state.round}</span>`; }

    function btn(label, className, onClick) {
      const b = document.createElement('button');
      b.textContent = label;
      if (className) b.className = className;
      b.addEventListener('click', onClick);
      return b;
    }

    async function play(src, rate = 1) {
      if (!src) return;
      els.audio.pause();
      els.audio.currentTime = 0;
      els.audio.src = src;
      els.audio.playbackRate = rate;
      try { await els.audio.play(); }
      catch { setStatus('Tap 🔊 Play to start audio on this device.'); }
    }

    function renderShell() {
      els.title.textContent = data.title || 'Game';
      els.subtitle.textContent = data.subtitle || '';
      els.controls.innerHTML = '';
      els.game.innerHTML = '';
      setStatus('');
      setScore();
    }

    function cardHTML(item, showText = true) {
      const image = item.img ? `<img src="${escapeHtml(item.img)}" alt="${escapeHtml(item.word || item.text || '')}">` : '';
      const label = showText ? `<div class="label">${escapeHtml(item.word || item.text || '')}</div>` : '';
      return `${image}${label}`;
    }

    function renderGrid(items, onClick, showText = true) {
      const grid = document.createElement('div');
      grid.className = 'grid';
      items.forEach((item, idx) => {
        const c = document.createElement('article');
        c.className = 'card';
        c.innerHTML = cardHTML(item, showText);
        c.addEventListener('click', () => onClick(item, idx, c));
        grid.appendChild(c);
      });
      els.game.appendChild(grid);
    }

    function newListenChooseRound() {
      renderShell();
      state.round += 1;
      setScore();
      const pool = data.settings.shuffle ? shuffle(data.items) : [...data.items];
      state.answer = pool[Math.floor(Math.random() * pool.length)];
      renderGrid(pool, (item, idx, card) => {
        if (item === state.answer || item.word === state.answer.word) {
          card.classList.add('correct');
          state.score += 1;
          setScore();
          setStatus('Good! 🎉');
          setTimeout(() => {
            if (state.round >= Number(data.settings.rounds || 5)) finishGame();
            else newListenChooseRound();
          }, 850);
        } else {
          card.classList.add('wrong');
          setStatus('Try again. Listen carefully.');
          setTimeout(() => card.classList.remove('wrong'), 450);
          setTimeout(() => play(state.answer.audio), 450);
        }
      }, false);
      els.controls.appendChild(btn('🔊 Play', 'primary', () => play(state.answer.audio)));
      els.controls.appendChild(btn('🔁 New', '', newListenChooseRound));
      setTimeout(() => play(state.answer.audio), 250);
    }

    function renderFastTap() {
      state.score = 0; state.round = 0;
      newListenChooseRound();
    }

    function renderMemoryMatch() {
      renderShell();
      state.selected = [];
      const cards = [];
      (data.items || []).forEach((item, i) => {
        cards.push({ kind: 'img', pair: i, item });
        cards.push({ kind: 'word', pair: i, item });
      });
      const deck = shuffle(cards);
      const grid = document.createElement('div');
      grid.className = 'grid memoryGrid';
      deck.forEach((cardData, idx) => {
        const c = document.createElement('article');
        c.className = 'card';
        c.dataset.pair = cardData.pair;
        c.dataset.open = '0';
        c.innerHTML = `<div class="largeText memoryQuestion">?</div>`;
        c.addEventListener('click', () => {
          if (c.dataset.open === '1' || state.selected.length >= 2) return;
          c.dataset.open = '1';
          c.innerHTML = cardData.kind === 'img'
            ? `<img src="${escapeHtml(cardData.item.img)}"><div class="label">${escapeHtml(cardData.item.word || '')}</div>`
            : `<div class="memoryWord">${escapeHtml(cardData.item.word || '')}</div>`;
          if (cardData.item.audio) play(cardData.item.audio);
          state.selected.push(c);
          if (state.selected.length === 2) {
            const [a, b] = state.selected;
            if (a.dataset.pair === b.dataset.pair) {
              a.classList.add('correct'); b.classList.add('correct');
              state.score += 1; setScore(); setStatus('Match!');
              state.selected = [];
              if (state.score === data.items.length) finishGame();
            } else {
              a.classList.add('wrong'); b.classList.add('wrong');
              setStatus('Try again.');
              setTimeout(() => {
                [a, b].forEach(x => { x.dataset.open = '0'; x.className = 'card'; x.innerHTML = `<div class="largeText memoryQuestion">?</div>`; });
                state.selected = [];
              }, 850);
            }
          }
        });
        grid.appendChild(c);
      });
      els.game.appendChild(grid);
      els.controls.appendChild(btn('🔁 Reset', '', renderMemoryMatch));
    }

    function renderSentenceBuilder() {
      renderShell();

      const items = data.items || [];

      if (!items.length) {
        els.game.innerHTML = `<div class="largeText">No items found.</div>`;
        setStatus('Check JSON: sentence-builder needs items[].');
        return;
      }

      const item = items[state.round % items.length];
      const target = item.target || '';
      const words = shuffle(
        item.words ||
        target.replace(/[.!?]/g, '').split(/\s+/).filter(Boolean)
      );

      state.bank = [...words];
      state.selected = [];

      const targetDiv = document.createElement('div');
      targetDiv.className = 'largeText';
      targetDiv.textContent = data.settings?.hideTarget ? 'Build the sentence.' : target;

      const answer = document.createElement('div');
      answer.className = 'builderAnswer';

      const bank = document.createElement('div');
      bank.className = 'builderTarget';

      els.game.appendChild(targetDiv);
      els.game.appendChild(answer);
      els.game.appendChild(bank);

      function refresh() {
        answer.innerHTML = '';
        bank.innerHTML = '';

        state.selected.forEach((w, i) => {
          const tile = document.createElement('div');
          tile.className = 'wordTile';
          tile.textContent = w;
          tile.addEventListener('click', () => {
            state.bank.push(w);
            state.selected.splice(i, 1);
            refresh();
          });
          answer.appendChild(tile);
        });

        state.bank.forEach((w, i) => {
          const tile = document.createElement('div');
          tile.className = 'wordTile';
          tile.textContent = w;
          tile.addEventListener('click', () => {
            state.selected.push(w);
            state.bank.splice(i, 1);
            refresh();
          });
          bank.appendChild(tile);
        });
      }

      function goNext() {
        state.round += 1;
        if (state.round >= items.length) finishGame();
        else renderSentenceBuilder();
      }

      refresh();

      els.controls.appendChild(btn('🔊 Play', 'primary', () => play(item.audio)));

      els.controls.appendChild(btn('✅ Check', 'good', () => {
        const built = state.selected.join(' ').replace(/\s+([.!?])/g, '$1').trim();
        const cleanTarget = target.replace(/[.!?]/g, '').trim().toLowerCase();
        const cleanBuilt = built.replace(/[.!?]/g, '').trim().toLowerCase();

        if (cleanBuilt === cleanTarget) {
          state.score += 1;
          setScore();
          setStatus('Good sentence! 🎉');
          play(item.audio);

          const autoNext = data.autoNext === true || data.settings?.autoNext === true;
          if (autoNext) setTimeout(goNext, 900);
        } else {
          setStatus('Not yet. Try again.');
        }
      }));

      els.controls.appendChild(btn('➡️ Next', '', goNext));
      els.controls.appendChild(btn('🔁 Reset', '', renderSentenceBuilder));

      setScore();
    }

    function renderListenComplete() {
      renderShell();
    
      const items = data.items || [];
      if (!items.length) {
        els.game.innerHTML = `<div class="largeText">No items found.</div>`;
        setStatus('Check JSON: listen-complete needs items[].');
        return;
      }
    
      const item = items[state.round % items.length];
      const shuffleOptions = data.shuffleOptions === true || data.settings?.shuffleOptions === true;
      const options = shuffleOptions ? shuffle(item.options || []) : (item.options || []);
      let roundResolved = false;
    
      state.answer = item.answer;

      function advanceRound() {
        state.round += 1;
        if (state.round >= items.length) finishGame();
        else renderListenComplete();
      }

      function goNext() {
        if (roundResolved) return;
        roundResolved = true;
        advanceRound();
      }
    
      const prompt = document.createElement('div');
      prompt.className = 'largeText';
      prompt.textContent = item.prompt || 'Listen and complete.';
      els.game.appendChild(prompt);
    
      renderGrid(options.map(o => ({ word: o })), (opt, idx, card) => {
        if (roundResolved) return;
        
        if (opt.word === item.answer) {
          roundResolved = true;
          card.classList.add('correct');
          state.score += 1;
          setScore();
          setStatus('Correct! 🎉');
          setTimeout(advanceRound, 800);

        } else {
          card.classList.add('wrong');
          setStatus('Try again.');
          setTimeout(() => card.classList.remove('wrong'), 450);
        }
      }, true);
    
      els.controls.appendChild(btn('🔊 Play', 'primary', () => play(item.audio)));
      if (isTeacherView()) {
        els.controls.appendChild(btn('➡️ Next', '', goNext));
      }

      setScore();
      setTimeout(() => play(item.audio), 250);
    }

    function renderLineOrdering() {
      renderShell();
      state.selected = [];
      state.bank = shuffle(data.lines || []);
      const answer = document.createElement('div'); answer.className = 'row';
      const bank = document.createElement('div'); bank.className = 'row';
      els.game.appendChild(answer); els.game.appendChild(bank);
      function refresh() {
        answer.innerHTML = ''; bank.innerHTML = '';
        state.selected.forEach((line, i) => {
          const el = document.createElement('div'); el.className = 'lineItem'; el.textContent = line.text;
          el.addEventListener('click', () => { state.bank.push(line); state.selected.splice(i, 1); refresh(); });
          answer.appendChild(el);
        });
        state.bank.forEach((line, i) => {
          const el = document.createElement('div'); el.className = 'lineItem'; el.textContent = line.text;
          el.addEventListener('click', () => { state.selected.push(line); state.bank.splice(i, 1); refresh(); if (line.audio) play(line.audio); });
          bank.appendChild(el);
        });
      }
      refresh();
      els.controls.appendChild(btn('✅ Check', 'good', () => {
        const ok = state.selected.length === data.lines.length && state.selected.every((l, i) => l.text === data.lines[i].text);
        if (ok) { setStatus('Correct order! 🎉'); state.score += 1; setScore(); }
        else setStatus('Not yet. Try again.');
      }));
      els.controls.appendChild(btn('🔁 Reset', '', renderLineOrdering));
    }

    function renderWhoSaysIt() {
      renderShell();
      const line = data.lines[Math.floor(Math.random() * data.lines.length)];
      state.answer = line.speaker;
      const speakers = shuffle([...(data.speakers || [...new Set(data.lines.map(l => l.speaker).filter(Boolean))])]);
      renderGrid(speakers.map(s => ({ word: s })), (item, idx, card) => {
        if (item.word === state.answer) { card.classList.add('correct'); setStatus('Correct! 🎉'); state.score += 1; setScore(); }
        else { card.classList.add('wrong'); setStatus('Try again.'); setTimeout(() => card.classList.remove('wrong'), 450); }
      }, true);
      els.controls.appendChild(btn('🔊 Play', 'primary', () => play(line.audio)));
      els.controls.appendChild(btn('🔁 New', '', renderWhoSaysIt));
      setTimeout(() => play(line.audio), 250);
    }



    function itemText(item) {
      return item.prompt || item.sentence || item.text || item.word || '';
    }

    function renderSingleCard(item, showText = true, extraClass = '') {
      const wrap = document.createElement('div');
      wrap.className = 'singleCardWrap';
      const c = document.createElement('article');
      c.className = `card ${extraClass}`.trim();
      c.innerHTML = cardHTML({ ...item, word: itemText(item) }, showText);
      wrap.appendChild(c);
      els.game.appendChild(wrap);
      return c;
    }

    function renderSpinWheel() {
      renderShell();
      const items = data.items || [];
      if (!items.length) {
        els.game.innerHTML = `<div class="largeText">No items found.</div>`;
        setStatus('Check JSON: spin-wheel needs items[].');
        return;
      }

      const stage = document.createElement('div');
      stage.className = 'wheelStage';
      const pointer = document.createElement('div');
      pointer.className = 'wheelPointer';
      const result = document.createElement('div');
      result.className = 'wheelResult';
      result.textContent = data.settings?.prompt || 'Spin and say.';
      const cardWrap = document.createElement('div');
      cardWrap.className = 'singleCardWrap';
      const card = document.createElement('article');
      card.className = 'card';
      card.innerHTML = `<div class="largeText">?</div>`;
      cardWrap.appendChild(card);
      stage.appendChild(pointer);
      stage.appendChild(cardWrap);
      stage.appendChild(result);
      els.game.appendChild(stage);

      let current = null;
      let spinning = false;
      const imageCache = new Map();

      items.forEach(item => {
        if (item.img && !imageCache.has(item.img)) {
          const img = new Image();
          img.src = item.img;
          imageCache.set(item.img, img);
        }
      });

      function show(item) {
        current = item;
             
        card.innerHTML = cardHTML(
          { ...item, word: itemText(item) },
          data.settings?.showText !== false
        );
      
        result.textContent = data.settings?.outputPrompt || 'Say it!';
      
        if (item.audio && data.settings?.autoPlay !== false) {
          play(item.audio);
        }
      }

      function spin() {
        if (spinning) return;
        spinning = true;
        setStatus('Spinning...');
        stage.classList.add('spinning');
        const spins = Number(data.settings?.spins || 18);
        const delay = Number(data.settings?.spinDelayMs || 140);
        let count = 0;
        const timer = setInterval(() => {
          const item = items[Math.floor(Math.random() * items.length)];
          card.innerHTML = cardHTML(
            { ...item, word: itemText(item) },
            data.settings?.showText !== false
          );
          count += 1;
          if (count >= spins) {
            clearInterval(timer);
            const finalItem = items[Math.floor(Math.random() * items.length)];
            show(finalItem);
            state.round += 1;
            setScore();
            setStatus('Your turn!');
            stage.classList.remove('spinning');
            spinning = false;
          }
        }, delay);
      }

      els.controls.appendChild(btn('🎡 Spin', 'primary', spin));
      els.controls.appendChild(btn('🔊 Play', '', () => current && play(current.audio)));
      els.controls.appendChild(btn('🔁 Reset', '', renderSpinWheel));
    }

    function renderLuckyBox() {
      renderShell();
      const items = data.items || [];
      if (!items.length) {
        els.game.innerHTML = `<div class="largeText">No items found.</div>`;
        setStatus('Check JSON: lucky-box needs items[].');
        return;
      }

      const count = Number(data.settings?.boxes || Math.min(6, items.length));
      const chosen = shuffle(items).slice(0, count);
      const grid = document.createElement('div');
      grid.className = 'boxGrid';
      chosen.forEach((item, idx) => {
        const box = document.createElement('div');
        box.className = 'luckyBox';
        box.textContent = data.settings?.boxIcon || '🎁';
        box.addEventListener('click', () => {
          if (box.classList.contains('opened')) return;
          box.classList.add('opened');
          box.innerHTML = cardHTML({ ...item, word: itemText(item) }, data.settings?.showText !== false);
          state.round += 1;
          setScore();
          setStatus(data.settings?.outputPrompt || 'Say it!');
          if (item.audio && data.settings?.autoPlay !== false) play(item.audio);
        });
        grid.appendChild(box);
      });
      els.game.appendChild(grid);
      els.controls.appendChild(btn('🔁 New Boxes', 'primary', renderLuckyBox));
    }

    function renderFindPicture() {
      renderShell();
      const items = data.items || [];
      if (!items.length) {
        els.game.innerHTML = `<div class="largeText">No items found.</div>`;
        setStatus('Check JSON: find-picture needs items[].');
        return;
      }
      state.round += 1;
      const poolSize = Number(data.settings?.choices || Math.min(6, items.length));
      const pool = shuffle(items).slice(0, poolSize);
      state.answer = pool[Math.floor(Math.random() * pool.length)];
      const prompt = data.settings?.prompt || 'Find';
      els.subtitle.textContent = `${prompt}: ${itemText(state.answer)}`;
      renderGrid(pool, (item, idx, card) => {
        if (item === state.answer || itemText(item) === itemText(state.answer)) {
          card.classList.add('correct');
          state.score += 1;
          setScore();
          setStatus('Good! 🎉');
          if (state.answer.audio && data.settings?.playOnCorrect === true) play(state.answer.audio);
          if (data.settings?.autoNext === true) setTimeout(renderFindPicture, 850);
        } else {
          card.classList.add('wrong');
          setStatus('Try again.');
          setTimeout(() => card.classList.remove('wrong'), 450);
        }
      }, data.settings?.showText === true);
      els.controls.appendChild(btn('🔊 Play', 'primary', () => play(state.answer.audio)));
      els.controls.appendChild(btn('➡️ New', '', renderFindPicture));
      setScore();
      if (state.answer.audio && data.settings?.autoPlay === true) setTimeout(() => play(state.answer.audio), 250);
    }

    function renderMissingPicture() {
      renderShell();
      const items = data.items || [];
      if (!items.length) {
        els.game.innerHTML = `<div class="largeText">No items found.</div>`;
        setStatus('Check JSON: missing-picture needs items[].');
        return;
      }
      const poolSize = Number(data.settings?.choices || Math.min(6, items.length));
      const pool = shuffle(items).slice(0, poolSize);
      state.answer = pool[Math.floor(Math.random() * pool.length)];
      let hidden = false;
      els.subtitle.textContent = data.settings?.studyPrompt || 'Look carefully.';

      const grid = document.createElement('div');
      grid.className = 'grid';
      const cardRefs = [];
      pool.forEach((item) => {
        const c = document.createElement('article');
        c.className = 'card missingCard';
        c.innerHTML = cardHTML({ ...item, word: itemText(item) }, data.settings?.showText !== false);
        grid.appendChild(c);
        cardRefs.push({ item, card: c });
      });
      els.game.appendChild(grid);

      function hideOne() {
        if (hidden) return;
        hidden = true;
        const target = cardRefs.find(x => x.item === state.answer || itemText(x.item) === itemText(state.answer));
        if (target) target.card.classList.add('hiddenPicture');
        els.subtitle.textContent = data.settings?.answerPrompt || "What's missing?";
        setStatus('Say the missing picture.');
      }

      function reveal() {
        cardRefs.forEach(x => x.card.classList.remove('hiddenPicture'));
        setStatus(`Missing: ${itemText(state.answer)}`);
        if (state.answer.audio && data.settings?.autoPlay !== false) play(state.answer.audio);
      }

      els.controls.appendChild(btn('🙈 Hide', 'primary', hideOne));
      els.controls.appendChild(btn('👀 Reveal', 'good', reveal));
      els.controls.appendChild(btn('➡️ New', '', renderMissingPicture));

      const autoHideMs = Number(data.settings?.autoHideMs || 0);
      if (autoHideMs > 0) setTimeout(hideOne, autoHideMs);
    }

    function finishGame() {
      renderShell();
      els.game.innerHTML = `<div class="largeText">Great job! 🎉</div>`;
      setStatus(`Final score: ${state.score}`);
      els.controls.appendChild(btn('🔁 Play Again', 'primary', startGame));
    }

    function startGame() {
      state = { score: 0, round: 0, answer: null, selected: [], bank: [], order: [] };
      switch ((data.type || '').toLowerCase()) {
        case 'listen-choose': return newListenChooseRound();
        case 'fast-tap': return renderFastTap();
        case 'memory-match': return renderMemoryMatch();
        case 'sentence-builder': return renderSentenceBuilder();
        case 'listen-complete': return renderListenComplete();
        case 'line-ordering': return renderLineOrdering();
        case 'who-says-it': return renderWhoSaysIt();
        case 'spin-wheel': return renderSpinWheel();
        case 'lucky-box': return renderLuckyBox();
        case 'find-picture': return renderFindPicture();
        case 'missing-picture': return renderMissingPicture();
        default:
          renderShell();
          els.game.innerHTML = `<div class="largeText">Unknown game type</div>`;
          setStatus('Check the JSON type.');
      }
    }

    async function init() {
      try {
        data = normalizeData(await loadData());
        startGame();
      } catch (err) {
        document.body.innerHTML = `<div class="error">Could not load game data.<br>${escapeHtml(err.message)}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
