<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text Player</title>
  <style>
    :root {
      --brand: #f45b1f;
      --brand-strong: #ff9300;
      --text: #111;
      --surface: #fff;
      --stage-padding: 18px;
      --card-max-width: 1320px;
      --card-padding: 28px;
      --layout-gap: 32px;
      --sidebar-width: 300px;

      --title-size: clamp(46px, 5.2vw, 82px);
      --title-line: 1.02;
      --main-size: clamp(50px, 5.8vw, 88px);
      --main-line: 1.06;
      --dialogue-size: clamp(48px, 5.4vw, 82px);
      --dialogue-long-size: clamp(34px, 3.6vw, 56px);
      --dialogue-line: 1.04;
      --sidebar-title-size: clamp(30px, 2.6vw, 42px);
      --sidebar-text-size: clamp(24px, 2.1vw, 34px);
      --sidebar-line: 1.18;
      --small-size: clamp(26px, 2.8vw, 42px);
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: var(--brand);
      color: var(--text);
      overflow: hidden;
    }

    body {
      box-sizing: border-box;
    }

    .stage {
      width: 100%;
      height: 100%;
      padding: var(--stage-padding);
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card {
      width: min(var(--card-max-width), 100%);
      max-height: 100%;
      background: var(--surface);
      border-radius: 0;
      box-shadow: 0 3px 10px rgba(0,0,0,0.25);
      padding: var(--card-padding);
      box-sizing: border-box;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      position: relative;
    }

    .orange {
      color: var(--brand);
    }

    .focus {
      text-align: center;
      background: var(--brand);
      color: #fff;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: var(--layout-gap);
    }

    .focus .label {
      font-size: var(--title-size);
      font-weight: 800;
      line-height: var(--title-line);
      white-space: pre-line;
    }

    .focus .text {
      font-size: var(--main-size);
      font-weight: 700;
      white-space: pre-line;
      line-height: var(--main-line);
    }

    .review-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--layout-gap);
      text-align: center;
    }

    .review-card h1 {
      margin: 0;
      font-size: var(--title-size);
      line-height: var(--title-line);
      font-weight: 800;
    }

    .review-card .prompt {
      font-size: var(--main-size);
      line-height: var(--main-line);
      font-weight: 700;
      white-space: pre-line;
    }

    .prompt-question,
    .prompt-response {
      white-space: pre-line;
      line-height: var(--main-line);
    }

    .prompt-response {
      font-weight: 800;
    }

    .qa-layout,
    .talking-dialogue-layout,
    .split-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--sidebar-width);
      gap: var(--layout-gap);
      align-items: center;
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 3px 10px rgba(0,0,0,0.25);
      min-height: 0;
    }


    .talking-dialogue-layout {
      --dialogue-font: var(--dialogue-long-size);
      --dialogue-line-height: 1.04;
      --dialogue-gap: 2px;
      --dialogue-title-font: var(--title-size);
      --dialogue-sidebar-width: var(--sidebar-width);
      grid-template-columns: minmax(0, 1fr) var(--dialogue-sidebar-width);
      align-items: stretch;
      height: 100%;
      overflow: hidden;
    }

    .talking-dialogue-main {
      min-width: 0;
      min-height: 0;
      overflow-y: auto;
      padding-right: 10px;
    }

    .talking-dialogue-layout .main-title {
      font-size: var(--dialogue-title-font);
      margin-bottom: 12px;
    }

    .talking-dialogue-lines {
      display: flex;
      flex-direction: column;
      gap: var(--dialogue-gap);
      font-size: var(--dialogue-font);
      line-height: var(--dialogue-line-height);
      letter-spacing: -0.015em;
    }

    .talking-dialogue-line {
      margin: 0;
      white-space: pre-line;
      color: var(--text);
      font-weight: 500;
    }

    .talking-dialogue-line.speaker-b {
      color: var(--brand);
    }

    .text-panel {
      min-width: 0;
      overflow: hidden;
    }

    .main-title {
      margin: 0 0 18px;
      font-size: var(--title-size);
      line-height: var(--title-line);
      font-weight: 800;
    }

    .big-prompt,
    .answers {
      font-size: var(--dialogue-size);
      line-height: var(--dialogue-line);
      letter-spacing: -0.015em;
      white-space: pre-line;
    }

    .big-prompt {
      margin: 0 0 24px;
      font-weight: 700;
    }

    .answers {
      color: var(--brand);
      font-weight: 800;
    }

    .answer-line {
      margin: 0 0 8px;
    }


    .sub-card {
      align-self: center;
      min-width: 0;
      max-height: 100%;
      overflow-y: auto;
      padding: 22px 24px;
      box-sizing: border-box;
      background: var(--surface);
      color: var(--text);
      border: 1px solid #ddd;
      box-shadow: 0 2px 6px rgba(0,0,0,0.18);
    }

    .sub-card h2 {
      margin: 0 0 14px;
      color: var(--brand);
      font-size: var(--sidebar-title-size);
      line-height: 1.05;
      font-weight: 800;
    }

    .sub-card ul {
      margin: 0;
      padding-left: 24px;
      font-size: var(--sidebar-text-size);
      line-height: var(--sidebar-line);
      font-style: italic;
    }

    .split-left h1,
    .split-right h1 {
      margin: 0 0 18px;
      font-size: var(--title-size);
      line-height: var(--title-line);
    }

    .split-left .content,
    .split-right .content {
      font-size: var(--main-size);
      line-height: var(--main-line);
      white-space: pre-line;
      font-weight: 700;
    }

    .full-dialogue {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 10px;
      height: 100%;
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    .full-dialogue h1 {
      margin: 0 0 24px;
      text-align: center;
      font-size: clamp(40px, 5vw, 64px);
      font-weight: 900;
      line-height: 1;
    }

    .dialogue-line {
      font-size: clamp(36px, 4.2vw, 60px);
      line-height: 1.12;
      margin: 0 0 10px;
      letter-spacing: -0.015em;
      white-space: pre-line;
    }

    .speaker-b {
      color: var(--brand);
    }

    @media (max-width: 760px) {
      :root {
        --stage-padding: 12px;
        --card-padding: 22px;
        --layout-gap: 18px;
        --sidebar-width: 1fr;
        --title-size: clamp(28px, 8vw, 42px);
        --main-size: clamp(30px, 8vw, 46px);
        --dialogue-size: clamp(28px, 7.2vw, 40px);
        --dialogue-long-size: clamp(30px, 7.8vw, 44px);
        --sidebar-title-size: clamp(16px, 4.2vw, 22px);
        --sidebar-text-size: clamp(18px, 4.8vw, 26px);
        --sidebar-line: 1.1;
      }

      .stage {
        padding: var(--stage-padding);
      }

      .card {
        height: 100%;
        min-height: 0;
        padding: var(--card-padding);
      }

      .qa-layout,
      .talking-dialogue-layout,
      .split-layout {
        grid-template-columns: 1fr;
        gap: var(--layout-gap);
        align-content: start;
        overflow-y: auto;
      }

      .talking-dialogue-layout {
        --dialogue-font: var(--dialogue-size);
        --dialogue-title-font: var(--title-size);
        --dialogue-sidebar-width: 1fr;
        display: block;
        position: relative;
        overflow: hidden;
        padding-bottom: var(--card-padding);
      }

      .talking-dialogue-main {
        height: 100%;
        overflow-y: auto;
        padding-right: 0;
        padding-bottom: 180px;
      }

      .talking-dialogue-main::after {
        content: "";
        display: block;
        height: 150px;
        flex: 0 0 auto;
      }

      .main-title {
        margin-bottom: 10px;
      }

      .big-prompt {
        margin-bottom: 14px;
      }

      .sub-card {
        width: 100%;
        box-sizing: border-box;
      }

      .qa-layout .sub-card {
        position: sticky;
        bottom: 0;
        z-index: 5;
        max-height: 68px;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 10px 12px;
        background: #fff;
        box-shadow: 0 -2px 8px rgba(0,0,0,0.16);
      }

      .talking-dialogue-layout .sub-card {
        position: absolute;
        left: 12px;
        right: 12px;
        bottom: 16px;
        z-index: 10;
        max-width: calc(100% - 24px);
        max-height: 68px;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 10px 12px;
        background: #fff;
        box-shadow: 0 -2px 8px rgba(0,0,0,0.16);
      }

      .qa-layout .sub-card h2,
      .talking-dialogue-layout .sub-card h2 {
        display: none;
      }

      .qa-layout .sub-card ul,
      .talking-dialogue-layout .sub-card ul {
        display: flex;
        flex-wrap: nowrap;
        align-items: center;
        gap: 0 18px;
        width: max-content;
        margin: 0;
        padding-left: 0;
        list-style-position: inside;
        font-size: var(--sidebar-text-size);
        line-height: var(--sidebar-line);
        font-style: normal;
        white-space: nowrap;
      }

      .qa-layout .sub-card li,
      .talking-dialogue-layout .sub-card li {
        padding-right: 4px;
      }
    }

    @media (orientation: landscape) and (max-height: 520px) and (max-width: 900px) {
      :root {
        --stage-padding: 8px;
        --card-padding: 14px;
        --layout-gap: 14px;
        --sidebar-width: 220px;
        --title-size: clamp(22px, 4vw, 34px);
        --main-size: clamp(24px, 4.2vw, 38px);
        --dialogue-size: clamp(22px, 3.8vw, 34px);
        --dialogue-long-size: clamp(24px, 3.4vw, 36px);
        --sidebar-title-size: clamp(18px, 3vw, 26px);
        --sidebar-text-size: clamp(16px, 2.6vw, 22px);
      }

      html, body {
        overflow: auto;
      }

      .stage {
        align-items: flex-start;
        justify-content: center;
        min-height: 100%;
        height: auto;
        overflow: visible;
        padding: var(--stage-padding);
      }

      .card {
        height: auto;
        min-height: calc(100vh - 16px);
        max-height: none;
        padding: var(--card-padding);
        overflow-y: auto;
      }

      .qa-layout,
      .talking-dialogue-layout,
      .split-layout {
        grid-template-columns: minmax(0, 1fr) var(--sidebar-width);
        gap: var(--layout-gap);
        align-items: start;
      }

      .talking-dialogue-layout {
        --dialogue-font: var(--dialogue-size);
        --dialogue-line-height: 1.0;
        --dialogue-gap: 0px;
        --dialogue-title-font: var(--title-size);
        --dialogue-sidebar-width: var(--sidebar-width);
        display: block;
        position: relative;
        overflow: hidden;
      }

      .talking-dialogue-main {
        height: calc(100vh - 44px);
        overflow-y: auto;
        padding-right: calc(var(--sidebar-width) + 22px);
        padding-bottom: 32px;
      }

      .talking-dialogue-layout .sub-card {
        position: absolute;
        right: var(--card-padding);
        top: calc(var(--card-padding) + 58px);
        transform: none;
        width: var(--sidebar-width);
        max-height: calc(100% - 28px);
        z-index: 10;
      }

      .talking-dialogue-layout .main-title,
      .main-title,
      .full-dialogue h1,
      .review-card h1 {
        margin-bottom: 8px;
      }

      .sub-card {
        padding: 10px 12px;
      }
    }
  </style>
</head>
<body>
  <main class="stage" id="stage"></main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const dataUrl = params.get("data");
    const stage = document.getElementById("stage");

    async function loadData() {
      if (!dataUrl) {
        renderError("Missing ?data= parameter");
        return;
      }

      try {
        const res = await fetch(dataUrl);
        if (!res.ok) throw new Error("Cannot load JSON: " + dataUrl);

        const data = await res.json();
        render(data);
      } catch (err) {
        console.error(err);
        renderError(err.message);
      }
    }

    function render(data) {
      const layout = data.layout || "focus_center";

      if (layout === "focus_center") return renderFocusCenter(data);
      if (layout === "qa_substitution") return renderQaSubstitution(data);
      if (layout === "talking_dialogue") return renderTalkingDialogue(data);
      if (layout === "split_prompt") return renderSplitPrompt(data);
      if (layout === "full_dialogue") return renderFullDialogue(data);
      if (layout === "review_card") return renderReviewCard(data);
      if (layout === "prompt_response") return renderPromptResponse(data);
      renderError("Unsupported layout: " + layout);
    }

    function renderPromptResponse(data) {
      const response = data.response || "";
      const highlight = data.highlight || "";
    
      const renderedResponse = highlight
        ? escapeHtml(response).replace(
            escapeHtml(highlight),
            `<span class="orange">${escapeHtml(highlight)}</span>`
          )
        : escapeHtml(response);
    
      stage.innerHTML = `
        <section class="card review-card">
          <h1>${escapeHtml(data.title || "")}</h1>
          <div class="prompt prompt-question">${escapeHtml(data.question || "")}</div>
          <div class="prompt prompt-response">
            ${renderedResponse}
          </div>
        </section>
      `;
    }

    function renderFocusCenter(data) {
      stage.innerHTML = `
        <section class="card focus">
          <div class="label">${escapeHtml(data.title || "")}</div>
          <div class="text">${escapeHtml(data.text || "")}</div>
        </section>
      `;
    }

    function renderReviewCard(data) {
      stage.innerHTML = `
        <section class="card review-card">
          <h1>${escapeHtml(data.title || "Review")}</h1>
          <div class="prompt">${escapeHtml(data.prompt || data.text || "")}</div>
        </section>
      `;
    }

    function renderQaSubstitution(data) {
      stage.innerHTML = `
        <section class="card qa-layout">
          <div class="text-panel">
            <div class="main-title">${escapeHtml(data.title || "Ask & Answer")}</div>
            <div class="big-prompt">${escapeHtml(data.prompt || "")}</div>
            <div class="answers">
              ${(data.answers || []).map(a => `<div class="answer-line">➜ ${escapeHtml(a)}</div>`).join("")}
            </div>
          </div>
          ${renderSubCard(data)}
        </section>
      `;
    }

    function renderTalkingDialogue(data) {
      stage.innerHTML = `
        <section class="card talking-dialogue-layout ${data.compact ? "compact" : ""}">
          <div class="talking-dialogue-main">
            <div class="main-title">
              <strong>${escapeHtml(data.title || "Let’s talk")}</strong>
            </div>
            
            <div class="talking-dialogue-lines">
              ${(data.lines || []).map(line => `
                <div class="dialogue-line ${line.speaker === "B" ? "speaker-b" : ""}">
                  ${escapeHtml(line.speaker || "")}: ${escapeHtml(line.text || "")}
                </div>
              `).join("")}
            </div>
          </div>
          ${renderSubCard(data)}
        </section>
      `;
    }

    function renderSplitPrompt(data) {
      stage.innerHTML = `
        <section class="card split-layout">
          <div class="split-left">
            <h1>${escapeHtml(data.left?.title || "")}</h1>
            <div class="content">${escapeHtml(data.left?.content || "")}</div>
          </div>
          <div class="split-right">
            <h1>${escapeHtml(data.right?.title || "")}</h1>
            <div class="content orange">${escapeHtml(data.right?.content || "")}</div>
          </div>
        </section>
      `;
    }

    function renderFullDialogue(data) {
      stage.innerHTML = `
        <section class="card full-dialogue">
          <h1>${escapeHtml(data.title || "Dialogue")}</h1>
          ${(data.lines || []).map(line => `
            <div class="dialogue-line ${line.speaker === "B" ? "speaker-b" : ""}">
              ${escapeHtml(line.speaker || "")}: ${escapeHtml(line.text || "")}
            </div>
          `).join("")}
        </section>
      `;
    }

    function renderSubCard(data) {
      const title = data.substitution_title || "Substitution";
      const items = data.substitutions || [];

      return `
        <aside class="sub-card">
          <h2>${escapeHtml(title)}</h2>
          <ul>
            ${items.map(item => `<li>${escapeHtml(item)}</li>`).join("")}
          </ul>
        </aside>
      `;
    }

    function renderError(message) {
      stage.innerHTML = `
        <section class="card">
          <h1>Error</h1>
          <p>${escapeHtml(message)}</p>
        </section>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loadData();
  </script>
</body>
</html>
